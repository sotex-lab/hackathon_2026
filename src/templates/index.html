<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <title>Energetska mreža Nigerije</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #f3f4f6;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 95vw;
      height: 90vh;
      margin: 5vh auto;
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.1);
      border: 1px solid #e5e7eb;
    }

    /* Legenda */
    .legend {
      padding: 10px 12px;
      background: white;
      line-height: 1.6;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      font-size: 13px;
    }
    .legend b {
      font-size: 13px;
    }
    .legend i {
      width: 14px;
      height: 14px;
      float: left;
      margin-right: 8px;
      margin-top: 4px;
      opacity: 0.9;
      border-radius: 50%;
      border: 1px solid #fff;
    }

    /* Toggle kontrola */
    .layer-toggle {
      padding: 10px 12px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      font-size: 13px;
      line-height: 1.8;
    }
    .layer-toggle label {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal {
  background: white;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  padding: 16px 20px;
  min-width: 320px;
  max-width: 480px;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.modal-header h2 {
  margin: 0;
  font-size: 18px;
}

#modal-close {
  border: none;
  background: transparent;
  font-size: 20px;
  cursor: pointer;
}

.modal-body {
  font-size: 14px;
}
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="details-modal" class="modal-backdrop" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Detalji stanice</h2>
      <button id="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <p>Ovde će ići detaljni graf/plot za odabranu stanicu.</p>
      <p id="modal-info" style="font-size:13px;color:#4b5563;"></p>
    </div>
  </div>
</div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map('map').setView([9.08, 8.67], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // 1. Granice Nigerije
    fetch("/static/nigeria.json")
      .then(res => res.json())
      .then(data => {
        L.geoJSON(data, {
          style: { color: "#333", weight: 2, fillOpacity: 0.05, interactive: false }
        }).addTo(map);
      });

      // MODAL

const modalEl = document.getElementById('details-modal');
const modalTitleEl = document.getElementById('modal-title');
const modalInfoEl = document.getElementById('modal-info');
const modalCloseBtn = document.getElementById('modal-close');

function openModal(stationName, stationType) {
  modalTitleEl.textContent = stationName || 'Detalji stanice';
  modalInfoEl.textContent = `Tip stanice: ${stationType.toUpperCase()}. Ovde će kolege ubaciti plot i dodatne informacije.`;
  modalEl.style.display = 'flex';
}

function closeModal() {
  modalEl.style.display = 'none';
}

modalCloseBtn.addEventListener('click', closeModal);
modalEl.addEventListener('click', (e) => {
  if (e.target === modalEl) {
    closeModal(); // klik na pozadinu zatvara modal
  }
});

    // 2. Učitavanje svih stanica
    fetch("/data/trafostanice")
      .then(res => res.json())
      .then(data => {
        const colors = {
          transmission: "#ff4757",
          substation: "#3742fa",
          distribution: "#2ed573"
        };

        const sizeConfig = {
          transmission: 18,  // velike
          substation: 13,    // srednje
          distribution: 7    // male
        };

        const counts = { transmission: 0, substation: 0, distribution: 0 };

        // Kreiramo odvojene slojeve po tipu
        const layers = {
          transmission: L.layerGroup(),
          substation: L.layerGroup(),
          distribution: L.layerGroup()
        };

        data.features.forEach(f => {
          const tip = f.properties.tip;
          if (!counts[tip]) counts[tip] = 0;
          counts[tip]++;

          const r = sizeConfig[tip] || 8;
          const color = colors[tip] || "#ffa502";

          const marker = L.circleMarker(
            [f.geometry.coordinates[1], f.geometry.coordinates[0]],
            {
              radius: r,
              fillColor: color,
              color: "#ffffff",
              weight: 1.5,
              fillOpacity: 0.85
            }
          );
          marker.on('click', () => {
  map.flyTo(
    [f.geometry.coordinates[1], f.geometry.coordinates[0]],
    10,                         // željeni zoom nivo
    { animate: true, duration: 1.0 }
  );
});

marker.bindPopup(`
  <div style="text-align:center">
    <b style="color:${color}">${tip.toUpperCase()}</b><br>
    <strong>${f.properties.naziv}</strong><br>
    <button
      type="button"
      style="margin-top:6px;padding:4px 8px;font-size:12px;border-radius:6px;border:1px solid #d1d5db;cursor:pointer;background:#f9fafb;"
      onclick="openModal('${(f.properties.naziv || '').replace(/'/g, "\\'")}', '${tip}')"
    >
      Detalji
    </button>
  </div>
`);

          layers[tip].addLayer(marker);
        });

        // Podrazumevano dodaj sve slojeve
        layers.transmission.addTo(map);
        layers.substation.addTo(map);
        layers.distribution.addTo(map);

        // 3. Legenda (kao kod koleginice)
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
          const div = L.DomUtil.create('div', 'legend');
          div.innerHTML = '<b>Legenda</b><br>';

          const labels = {
            transmission: 'Transmission (Velike)',
            substation: 'Substation (Srednje)',
            distribution: 'Distribution (Male)'
          };

          ['transmission', 'substation', 'distribution'].forEach(tip => {
            div.innerHTML += `
              <i style="background:${colors[tip]}"></i>
              ${labels[tip]}: <b>${counts[tip] || 0}</b><br>
            `;
          });

          return div;
        };
        legend.addTo(map);

        // 4. Toggle kontrola za slojeve
        const toggle = L.control({ position: 'topright' });
        toggle.onAdd = function () {
          const div = L.DomUtil.create('div', 'layer-toggle');
          div.innerHTML = '<b>Prikaz slojeva</b><br>';

          div.innerHTML += `
            <label>
              <input type="checkbox" id="chk-transmission" checked />
              Transmission
            </label>
            <label>
              <input type="checkbox" id="chk-substation" checked />
              Substation
            </label>
            <label>
              <input type="checkbox" id="chk-distribution" checked />
              Distribution
            </label>
          `;

          // Spreči scroll mapu kad klikćeš po div-u
          L.DomEvent.disableClickPropagation(div);
          return div;
        };
        toggle.addTo(map);

        // Eventi za toggle
        document.getElementById('chk-transmission').addEventListener('change', (e) => {
          if (e.target.checked) {
            map.addLayer(layers.transmission);
          } else {
            map.removeLayer(layers.transmission);
          }
        });

        document.getElementById('chk-substation').addEventListener('change', (e) => {
          if (e.target.checked) {
            map.addLayer(layers.substation);
          } else {
            map.removeLayer(layers.substation);
          }
        });

        document.getElementById('chk-distribution').addEventListener('change', (e) => {
          if (e.target.checked) {
            map.addLayer(layers.distribution);
          } else {
            map.removeLayer(layers.distribution);
          }
        });
      })
      .catch(err => console.error("Greška pri učitavanju stanica:", err));
  </script>
</body>
</html>
