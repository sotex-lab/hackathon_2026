<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <title>Nigeria GeoJSON Only</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #f3f4f6; /* svetlosiva pozadina oko mape */
      font-family: Arial, sans-serif;
    }

    /* Kontejner za mapu sa borderom */
    #map {
      width: 90vw;
      height: 90vh;
      margin: 5vh auto;
      border: 2px solid #d1d5db;     /* sivi border oko cele mape */
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
      background: #ffffff;           /* bela pozadina unutar mape */
    }

    .leaflet-container {
      background: transparent;       /* nema dodatne Leaflet pozadine */
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    // Minimalna inicijalizacija mape
    const map = L.map('map', {
      zoomControl: true,
      attributionControl: false
    }).setView([9.6, 8.0], 6);

    // Učitavanje GeoJSON-a iz Flask rute
    fetch("/data/nigeria")
      .then(response => response.json())
      .then(geojsonData => {
        // Stil: sive linije, blago siva unutrašnjost, da paše na belu pozadinu
        const nigeriaLayer = L.geoJSON(geojsonData, {
          style: function(feature) {
            return {
              color: "#9ca3af",      // siva linija (border regija)
              weight: 1.3,
              fillColor: "#e5e7eb",  // svetlo sivo punjenje
              fillOpacity: 0.6
            };
          },
          onEachFeature: function(feature, layer) {
            // Ako postoji ime regiona, prikaži ga
            if (feature.properties) {
              const name =
                feature.properties.NAME ||
                feature.properties.name ||
                feature.properties.admin ||
                "Region";
              layer.bindPopup(`<strong>${name}</strong>`);
            }
          }
        }).addTo(map);

        const bounds = nigeriaLayer.getBounds();
        map.fitBounds(bounds, { padding: [20, 20] });
        map.setMaxBounds(bounds.pad(0.1));
      })
      .catch(err => {
        console.error("Greška pri učitavanju GeoJSON-a za Nigeriju:", err);
      });
  </script>
</body>
</html>
