<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <title>Energetska mreža Nigerije</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #f3f4f6;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 95vw;
      height: 90vh;
      margin: 5vh auto;
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.1);
      border: 1px solid #e5e7eb;
    }

    /* Legenda */
    .legend {
      padding: 10px 12px;
      background: white;
      line-height: 1.6;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      font-size: 13px;
    }
    .legend b {
      font-size: 13px;
    }

    
    .legend i {
      width: 14px;
      height: 14px;
      float: left;
      margin-right: 8px;
      margin-top: 4px;
      opacity: 0.9;
      border-radius: 50%;
      border: 1px solid #fff;
    }

    /* Toggle kontrola */
    .layer-toggle {
      padding: 10px 12px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      font-size: 13px;
      line-height: 1.8;
    }
    .layer-toggle label {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      padding: 16px 20px;
      min-width: 320px;
      max-width: 480px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 18px;
    }

    #modal-close {
      border: none;
      background: transparent;
      font-size: 20px;
      cursor: pointer;
    }

    .modal-body {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Search bar -->
  <div id="search-container" style="
    position: fixed;
    top: 120px;
    left: 50px;
    z-index:1001;
  ">
    <div style="
      padding: 8px 10px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      display: flex;
      gap: 6px;
      align-items: center;
    ">
      <input
        id="search-input"
        type="text"
        placeholder="Naziv stanice..."
        style="padding:4px 8px;font-size:13px;min-width:200px;border:1px solid #d1d5db;border-radius:4px;"
      />
      <button
        id="search-btn"
        style="padding:4px 8px;font-size:13px;border-radius:4px;border:1px solid #d1d5db;background:#f9fafb;cursor:pointer;"
      >
        Pronađi
      </button>
    </div>
  </div>

  <!-- Modal za detalje -->
  <div id="details-modal" class="modal-backdrop" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Detalji stanice</h2>
        <button id="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <p>Ovde će ići detaljni graf/plot za odabranu stanicu.</p>
        <p id="modal-info" style="font-size:13px;color:#4b5563;"></p>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map('map').setView([9.08, 8.67], 6);

    map.createPane('linesPane');
    map.getPane('linesPane').style.zIndex = 200;

    map.createPane('markersPane');
    map.getPane('markersPane').style.zIndex = 400;

    map.on('click', function () {
      resetSelectedLine();
    });

    let selectedLineLayer = null;

    function resetSelectedLine() {
      if (!selectedLineLayer) return;

      const tip = selectedLineLayer.feature?.properties?.tip;
      selectedLineLayer.setStyle({
        color: getLineColor(tip),
        weight: getLineWeight(tip),
        opacity: 0.75
      });

      selectedLineLayer = null;
    }

    function highlightLine(layer) {
      resetSelectedLine();

      const tip = layer.feature?.properties?.tip;

      layer.setStyle({
        color: getLineColor(tip),
        weight: getLineWeight(tip) + 3,
        opacity: 1
      });

      selectedLineLayer = layer;
    }

    const lineLayers = {
      feeder33: L.layerGroup(),
      feeder11: L.layerGroup()
    };
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    function getLineColor(tip) {
      if (tip === "feeder33") return "#ff9f1a";
      if (tip === "feeder11") return "#00b894";
      return "#636e72";
    }

    function getLineWeight(tip) {
      if (tip === "feeder33") return 4;
      if (tip === "feeder11") return 2.5;
      return 2;
    }

    // Granice Nigerije
    fetch("/static/nigeria.json")
      .then(res => res.json())
      .then(data => {
        L.geoJSON(data, {
          style: { color: "#333", weight: 2, fillOpacity: 0.05, interactive: false }
        }).addTo(map);
      });

    // MODAL
    const modalEl = document.getElementById('details-modal');
    const modalTitleEl = document.getElementById('modal-title');
    const modalInfoEl = document.getElementById('modal-info');
    const modalCloseBtn = document.getElementById('modal-close');

    function openModal(stationName, stationType) {
      modalTitleEl.textContent = stationName || 'Detalji stanice';
      modalInfoEl.textContent =
        `Tip stanice: ${stationType.toUpperCase()}. Ovde će kolege ubaciti plot i dodatne informacije.`;
      modalEl.style.display = 'flex';
    }

    function closeModal() {
      modalEl.style.display = 'none';
    }

    modalCloseBtn.addEventListener('click', closeModal);
    modalEl.addEventListener('click', (e) => {
      if (e.target === modalEl) {
        closeModal();
      }
    });

    // Globalne promenljive za search
    let allFeatures = [];
    const featureMarkers = {};

    fetch("/data/vodovi")
      .then(res => res.json())
      .then(data => {
        data.features.forEach((feature) => {
          const tip = feature.properties.tip;
          const color = getLineColor(tip);
          const weight = getLineWeight(tip);

          const layer = L.geoJSON(feature, {
            pane: 'linesPane',
            style: {
              color: color,
              weight: weight,
              opacity: 0.75
            },
            onEachFeature: function (f, l) {
              l.bindPopup(`
                <div style="text-align:center">
                  <b style="color:${color}">${tip.toUpperCase()}</b><br>
                  <strong>${f.properties.naziv || "Nepoznat vod"}</strong><br>
                  Povezanih čvorova: ${f.properties.children_count || 0}<br>
                  ${f.properties.nameplate_rating ? `Rating: ${f.properties.nameplate_rating}<br>` : ""}
                </div>
              `);

              l.on('mouseover', function () {
                if (selectedLineLayer !== l) {
                  l.setStyle({
                    weight: getLineWeight(tip) + 1,
                    opacity: 0.95
                  });
                }
              });

              l.on('mouseout', function () {
                if (selectedLineLayer !== l) {
                  l.setStyle({
                    weight: getLineWeight(tip),
                    opacity: 0.75
                  });
                }
              });

              l.on('click', function (e) {
                L.DomEvent.stopPropagation(e);
                highlightLine(l);

                map.fitBounds(l.getBounds(), {
                  padding: [30, 30]
                });
              });
            }
          });

          if (lineLayers[tip]) {
            lineLayers[tip].addLayer(layer);
          }
        });

        lineLayers.feeder33.addTo(map);
        lineLayers.feeder11.addTo(map);
      })
      .catch(err => console.error("Greška pri učitavanju vodova:", err));



    // Učitavanje svih stanica
    fetch("/data/trafostanice")
      .then(res => res.json())
      .then(data => {
        allFeatures = data.features;

        const colors = {
          transmission: "#ff4757",
          substation: "#3742fa",
          distribution: "#2ed573"
        };

        const sizeConfig = {
          transmission: 18,
          substation: 13,
          distribution: 7
        };

        const counts = { transmission: 0, substation: 0, distribution: 0 };

        const layers = {
          transmission: L.layerGroup(),
          substation: L.layerGroup(),
          distribution: L.layerGroup()
        };

        allFeatures.forEach((f, idx) => {
          const tip = f.properties.tip;
          if (!counts[tip]) counts[tip] = 0;
          counts[tip]++;

          const r = sizeConfig[tip] || 8;
          const color = colors[tip] || "#ffa502";

          const lat = f.geometry.coordinates[1];
          const lon = f.geometry.coordinates[0];

          const marker = L.circleMarker([lat, lon], {
            pane: 'markersPane',
            radius: r,
            fillColor: color,
            color: "#ffffff",
            weight: 1.5,
            fillOpacity: 0.85
          });

          // Zoom na klik
          marker.on('click', () => {
            map.flyTo([lat, lon], 10, { animate: true, duration: 1.0 });
          });

          marker.bindPopup(`
            <div style="text-align:center">
              <b style="color:${color}">${tip.toUpperCase()}</b><br>
              <strong>${f.properties.naziv}</strong><br>
              <button
                type="button"
                style="margin-top:6px;padding:4px 8px;font-size:12px;border-radius:6px;border:1px solid #d1d5db;cursor:pointer;background:#f9fafb;"
                onclick="openModal('${(f.properties.naziv || '').replace(/'/g, "\\'")}', '${tip}')"
              >
                Detalji
              </button>
            </div>
          `);

          layers[tip].addLayer(marker);
          featureMarkers[idx] = marker;
        });

        layers.transmission.addTo(map);
        layers.substation.addTo(map);
        layers.distribution.addTo(map);

        // Legenda
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
          const div = L.DomUtil.create('div', 'legend');
          div.innerHTML = '<b>Legenda</b><br>';

          const labels = {
            transmission: 'Transmission (Velike)',
            substation: 'Substation (Srednje)',
            distribution: 'Distribution (Male)'
          };

          ['transmission', 'substation', 'distribution'].forEach(tip => {
            div.innerHTML += `
              <i style="background:${colors[tip]}"></i>
              ${labels[tip]}: <b>${counts[tip] || 0}</b><br>
            `;
          });

          return div;
        };
        legend.addTo(map);

        // Toggle slojeva
        const toggle = L.control({ position: 'topright' });
        toggle.onAdd = function () {
          const div = L.DomUtil.create('div', 'layer-toggle');
          div.innerHTML = '<b>Prikaz slojeva</b><br>';

          div.innerHTML += `
            <label>
              <input type="checkbox" id="chk-transmission" checked />
              Transmission
            </label>
            <label>
              <input type="checkbox" id="chk-substation" checked />
              Substation
            </label>
            <label>
              <input type="checkbox" id="chk-distribution" checked />
              Distribution
            </label>
            <label>
              <input type="checkbox" id="chk-feeder33" checked />
              Feeder 33kV
            </label>
            <label>
              <input type="checkbox" id="chk-feeder11" checked />
              Feeder 11kV
            </label>
          `;

          L.DomEvent.disableClickPropagation(div);
          return div;
        };
        toggle.addTo(map);

        document.getElementById('chk-transmission').addEventListener('change', (e) => {
          if (e.target.checked) map.addLayer(layers.transmission);
          else map.removeLayer(layers.transmission);
        });

        document.getElementById('chk-substation').addEventListener('change', (e) => {
          if (e.target.checked) map.addLayer(layers.substation);
          else map.removeLayer(layers.substation);
        });

        document.getElementById('chk-distribution').addEventListener('change', (e) => {
          if (e.target.checked) map.addLayer(layers.distribution);
          else map.removeLayer(layers.distribution);
        });

        document.getElementById('chk-feeder33').addEventListener('change', (e) => {
        if (e.target.checked) map.addLayer(lineLayers.feeder33);
        else map.removeLayer(lineLayers.feeder33);
        });

      document.getElementById('chk-feeder11').addEventListener('change', (e) => {
        if (e.target.checked) map.addLayer(lineLayers.feeder11);
        else map.removeLayer(lineLayers.feeder11);
        });
      })
      .catch(err => console.error("Greška pri učitavanju stanica:", err));

    // SEARCH

    function searchStationByName() {
      const input = document.getElementById('search-input');
      const query = input.value.trim().toLowerCase();
      if (!query) return;

      let foundIdx = null;
      for (let i = 0; i < allFeatures.length; i++) {
        const name = (allFeatures[i].properties.naziv || '').toLowerCase();
        if (name.includes(query)) {
          foundIdx = i;
          break;
        }
      }

      if (foundIdx === null) {
        alert(`Nema stanice koja sadrži: "${query}"`);
        return;
      }

      const f = allFeatures[foundIdx];
      const lat = f.geometry.coordinates[1];
      const lon = f.geometry.coordinates[0];

      const marker = featureMarkers[foundIdx];
      if (marker) {
        map.flyTo([lat, lon], 10, { animate: true, duration: 1.0 });
        marker.openPopup();
      }
    }

    document.getElementById('search-btn').addEventListener('click', searchStationByName);
    document.getElementById('search-input').addEventListener('keyup', (e) => {
      if (e.key === 'Enter') {
        searchStationByName();
      }
    });
  </script>
</body>
</html>
