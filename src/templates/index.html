<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <title>Energetska Mreža Nigerije</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body { height: 100%; margin: 0; padding: 0; background: #f3f4f6; font-family: Arial, sans-serif; }
    #map { width: 95vw; height: 90vh; margin: 5vh auto; border-radius: 12px; box-shadow: 0 10px 24px rgba(0,0,0,0.1); }

    /* Stil za legendu */
    .legend {
      padding: 12px;
      background: white;
      line-height: 1.8;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      font-size: 13px;
    }
    .legend i {
      width: 14px;
      height: 14px;
      float: left;
      margin-right: 10px;
      margin-top: 4px;
      opacity: 0.9;
      border-radius: 50%;
      border: 1px solid #fff;
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map('map').setView([9.08, 8.67], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // 1. Učitaj granice Nigerije
    fetch("/data/nigeria")
      .then(res => res.json())
      .then(data => {
        L.geoJSON(data, {
            style: { color: "#333", weight: 2, fillOpacity: 0.05, interactive: false }
        }).addTo(map);
      });

    // 2. Učitaj stanice iz baze
    fetch("/data/trafostanice")
      .then(res => res.json())
      .then(data => {

        // Brojanje za legendu
        const counts = { transmission: 0, substation: 0, distribution: 0 };
        data.features.forEach(f => {
          const t = f.properties.tip;
          if(counts[t] !== undefined) counts[t]++;
        });

        // OVDE JE MOĆ: Ručno podešene veličine (Plava > Zelena)
        const sizeConfig = {
          'transmission': 18,  // Crvena (Najveća)
          'substation': 13,    // Plava (Srednja)
          'distribution': 7    // Zelena (Najmanja)
        };

        const colors = {
          transmission: "#ff4757",
          substation: "#3742fa",
          distribution: "#2ed573"
        };

        L.geoJSON(data, {
          pointToLayer: function(feature, latlng) {
            const tip = feature.properties.tip;
            const r = sizeConfig[tip] || 8; // Ako ne prepozna tip, stavi 8px

            return L.circleMarker(latlng, {
              radius: r,
              fillColor: colors[tip] || "#ffa502",
              color: "#ffffff",
              weight: 1.5,
              fillOpacity: 0.85
            });
          },
          onEachFeature: function(feature, layer) {
            const t = feature.properties.tip;
            layer.bindPopup(`
                <div style="text-align:center">
                    <b style="color: ${colors[t]}">${t.toUpperCase()}</b><br>
                    <strong>${feature.properties.naziv}</strong>
                </div>
            `);
          }
        }).addTo(map);

        // 3. Legenda
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
          const div = L.DomUtil.create('div', 'legend');
          div.innerHTML = '<b>Legenda</b><br>';

          const labeli = {
              'transmission': 'Transmission (Velike)',
              'substation': 'Substation (Srednje)',
              'distribution': 'Distribution (Male)'
          };

          // Redosled u legendi: prvo prenos, pa podstanice, pa distribucija
          ['transmission', 'substation', 'distribution'].forEach(tip => {
            div.innerHTML += `
                <i style="background: ${colors[tip]}"></i>
                ${labeli[tip]}: <b>${counts[tip]}</b><br>
            `;
          });
          return div;
        };
        legend.addTo(map);
      })
      .catch(err => console.error("Greška pri učitavanju:", err));
  </script>
</body>
</html>
